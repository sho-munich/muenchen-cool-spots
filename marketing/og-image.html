<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    color: #0F172A;
    background:
      radial-gradient(900px 600px at 100% -20%, #BAE6FD 0%, transparent 60%),
      radial-gradient(700px 500px at -10% 120%, #99F6E4 0%, transparent 55%),
      linear-gradient(135deg, #F0F9FF 0%, #E0F2FE 100%);
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 70px 80px;
  }
  /* dekorative Schneeflocken */
  .flake { position: absolute; opacity: .18; color: #0EA5E9; user-select: none; }
  .f1 { top: 60px; right: 90px; font-size: 120px; }
  .f2 { bottom: 70px; right: 260px; font-size: 64px; opacity: .12; }
  .f3 { top: 230px; right: 360px; font-size: 44px; opacity: .14; }

  .brand { display: flex; align-items: center; gap: 16px; margin-bottom: 26px; }
  .brand .logo { font-size: 58px; }
  .brand .name {
    font-size: 30px; font-weight: 800; letter-spacing: -0.01em;
    color: #0EA5E9; text-transform: uppercase;
  }

  h1 {
    font-size: 78px; font-weight: 900; line-height: 1.02;
    letter-spacing: -0.025em; max-width: 880px;
  }
  h1 .hl { color: #0EA5E9; }

  p.sub {
    margin-top: 22px; font-size: 32px; font-weight: 600;
    color: #334155; max-width: 760px; line-height: 1.3;
  }

  .badges { display: flex; gap: 14px; margin-top: 38px; flex-wrap: wrap; }
  .badge {
    display: inline-flex; align-items: center; gap: 10px;
    background: #ffffff; border: 1px solid #BAE6FD; border-radius: 999px;
    padding: 12px 22px; font-size: 24px; font-weight: 700;
    box-shadow: 0 4px 14px rgba(14,165,233,.12);
  }
  .badge.green { color: #10B981; border-color: #A7F3D0; }
  .badge.blue { color: #0EA5E9; }
  .badge.slate { color: #475569; }

  .url {
    position: absolute; left: 80px; bottom: 56px;
    font-size: 28px; font-weight: 800; color: #0EA5E9;
    display: flex; align-items: center; gap: 12px;
  }
  .pill-free {
    position: absolute; right: 80px; bottom: 52px;
    background: #0EA5E9; color: #fff; font-weight: 800; font-size: 22px;
    padding: 12px 24px; border-radius: 999px;
    box-shadow: 0 8px 22px rgba(14,165,233,.45);
  }
</style>
</head>
<body>
  <div class="flake f1">❄️</div>
  <div class="flake f2">❄️</div>
  <div class="flake f3">❄️</div>

  <div class="brand">
    <span class="logo">❄️</span>
    <span class="name">München Cool Spots</span>
  </div>

  <h1>Wo bleibt's <span class="hl">kühl</span><br/>in München?</h1>
  <p class="sub">Cafés, Restaurants &amp; Co-Working-Spaces mit Klimaanlage – von der Community.</p>

  <div class="badges">
    <span class="badge green">❄️ Klimaanlage</span>
    <span class="badge blue">📶 WLAN</span>
    <span class="badge slate">☕ Arbeiten · 🍽 Abhängen · 💻 Daten</span>
  </div>

  <div class="url">🔗 muenchen-cool-spots.vercel.app</div>
  <div class="pill-free">Kostenlos · ohne Login</div>
</body>
</html>
